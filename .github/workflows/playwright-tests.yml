name: Playwright Java Tests

# Opravená sekce ON - definuje, kdy se má test spustit
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    # 1. Stažení kódu z GitHub repozitáře
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Nastavení Javy verze 17
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    # 3. Stažení závislostí a instalace prohlížečů Playwright
    - name: Install Playwright Browsers
      run: |
        mvn compile
        mvn exec:java -e -Dexec.mainClass=com.microsoft.playwright.CLI -Dexec.args="install --with-deps"

    # 4. Spuštění testu na virtuální obrazovce (Vynucujeme češtinu)
    - name: Run Playwright Tests with Virtual Screen
      env:
        LANG: cs_CZ.UTF-8
      run: |
        xvfb-run --auto-servernum --server-args="-screen 0 1280x1024x24" mvn clean test -Dtest=AppTest -Dheadless=false surefire-report:report -DlinkXRef=false


    # 5. Bezpečné uložení vygenerovaného HTML reportu a screenshotů
    - name: Upload Test Report & Screenshots
      if: always() # Uloží se i při selhání testu
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: |
          target/site/
          target/surefire-reports/
